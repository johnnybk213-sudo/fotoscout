<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FotoScout</title>
<style>
  :root {
    --primary: #4a7fff;
    --accent: #f0a030;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6c757d;
    --border: #dee2e6;
    --danger: #dc3545;
    --success: #28a745;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    width: 440px;
    min-height: 400px;
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-size: 18px; font-weight: 800; }
  .logo .fs { color: var(--primary); }
  .header-actions { display: flex; gap: 6px; }

  .btn {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: #3a6fee; color: #fff; }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { background: #e09020; color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  .view { display: none; }
  .view.active { display: block; }

  .form-view { padding: 16px 18px; }

  .image-preview {
    width: 100%;
    max-height: 180px;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
    background: #eef1f5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-preview img { width: 100%; max-height: 180px; object-fit: contain; }
  .image-preview .placeholder { padding: 40px; color: var(--text-dim); font-size: 13px; }

  .mode-selector { display: flex; gap: 6px; margin-bottom: 14px; }

  .mode-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--card);
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
    color: var(--text-dim);
  }

  .mode-btn:hover { border-color: var(--text-dim); }
  .mode-btn.active-loc { border-color: var(--primary); color: var(--primary); background: rgba(74,127,255,0.06); }
  .mode-btn.active-insp { border-color: var(--accent); color: var(--accent); background: rgba(240,160,48,0.06); }
  .mode-btn.active-existing { border-color: var(--success); color: var(--success); background: rgba(40,167,69,0.06); }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 50px; }
  .form-group .help { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--card); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; max-height: 160px; overflow-y: auto;
    z-index: 10; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 7px 10px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .autocomplete-item:hover { background: #f0f5ff; }
  .autocomplete-item:last-child { border-bottom: none; }
  .coords-display { font-size: 11px; color: var(--success); margin-top: 3px; }

  .form-footer {
    padding: 12px 18px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end; background: var(--card);
  }

  .post-search {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; margin-bottom: 10px;
  }
  .post-search:focus { outline: none; border-color: var(--success); }

  .post-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }

  .post-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
  }
  .post-item:hover { border-color: var(--success); background: rgba(40,167,69,0.04); }
  .post-item .post-icon { font-size: 16px; flex-shrink: 0; }
  .post-item .post-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-item .post-type { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

  .no-posts { text-align: center; padding: 30px 16px; color: var(--text-dim); font-size: 12px; line-height: 1.6; }

  .list-view { padding: 16px 18px; }
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .list-header h3 { font-size: 15px; }
  .pending-list { display: flex; flex-direction: column; gap: 8px; }

  .pending-item {
    display: flex; gap: 10px; padding: 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius); align-items: center;
  }
  .pending-item .thumb { width: 50px; height: 50px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
  .pending-item .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pending-item .info { flex: 1; min-width: 0; }
  .pending-item .info .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pending-item .info .meta { font-size: 11px; color: var(--text-dim); }
  .pending-item .actions { flex-shrink: 0; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }

  .toast {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    z-index: 300; transition: transform 0.3s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .settings-bar {
    padding: 8px 18px; background: #eef1f5; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; font-size: 11px;
  }
  .settings-bar input {
    flex: 1; padding: 5px 8px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 11px; font-family: monospace;
  }
  .settings-bar input:focus { outline: none; border-color: var(--primary); }
  .settings-bar .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .settings-bar .status-dot.ok { background: var(--success); }
  .settings-bar .status-dot.missing { background: var(--danger); }
  .settings-toggle { cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .settings-panel { display: none; }
  .settings-panel.open { display: flex; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="fs">FotoScout</span></div>
  <div class="header-actions">
    <button class="btn btn-sm" id="btnNavForm">+ Ny</button>
    <button class="btn btn-sm" id="btnNavList">Gemte</button>
    <span class="settings-toggle" id="btnSettings" title="GitHub indstillinger">⚙</span>
  </div>
</div>
<div class="settings-bar settings-panel" id="settingsPanel">
  <span class="status-dot missing" id="ghStatusDot"></span>
  <input type="password" id="ghToken" placeholder="GitHub token (fine-grained, repo contents r/w)">
  <button class="btn btn-sm" id="btnSaveToken">Gem</button>
</div>

<!-- FORM VIEW -->
<div class="view active" id="view-form">
  <div class="form-view">
    <div class="image-preview" id="imagePreview">
      <div class="placeholder">Intet billede valgt</div>
    </div>

    <div class="mode-selector">
      <button class="mode-btn active-loc" id="modeLocBtn">Ny lokation</button>
      <button class="mode-btn" id="modeInspBtn">Ny inspiration</button>
      <button class="mode-btn" id="modeExistBtn">Eksisterende</button>
    </div>

    <div id="fields-location">
      <div class="form-group">
        <label>Navn *</label>
        <input type="text" id="f-name" placeholder="F.eks. Rubjerg Knude Fyr">
      </div>
      <div class="form-group">
        <label>Adresse *</label>
        <div class="autocomplete-wrap">
          <input type="text" id="f-address" placeholder="Begynd at skrive adresse..." autocomplete="off">
          <div class="autocomplete-list" id="dawaList"></div>
        </div>
        <div class="coords-display" id="f-coords-loc">Vælg fra listen for koordinater</div>
        <input type="hidden" id="f-lat-loc">
        <input type="hidden" id="f-lon-loc">
      </div>
    </div>

    <div id="fields-inspiration" style="display:none">
      <div class="form-group">
        <label>Titel *</label>
        <input type="text" id="f-title" placeholder="F.eks. Dramatisk bølgeslag">
      </div>
      <div class="form-group">
        <label>Område / Sted *</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="f-area" placeholder="Blokhus, Søndervig, Hvide Sande..." style="flex:1">
          <button class="btn btn-sm" id="btnGeocode">Søg</button>
        </div>
        <div class="coords-display" id="f-coords-insp">Tryk "Søg" for koordinater</div>
        <input type="hidden" id="f-lat-insp">
        <input type="hidden" id="f-lon-insp">
      </div>
    </div>

    <div id="fields-existing" style="display:none">
      <input type="text" class="post-search" id="postSearch" placeholder="Søg i posts...">
      <div class="post-list" id="postList"></div>
    </div>

    <div id="fields-shared">
      <div class="form-group">
        <label>Noter</label>
        <textarea id="f-notes" placeholder="Fototips, udstyr, tidspunkt..."></textarea>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <input type="text" id="f-tags" placeholder="fyrtårn, klint, nordjylland">
        <div class="help">Kommaseparerede tags</div>
      </div>
    </div>
  </div>

  <div class="form-footer" id="formFooter">
    <button class="btn" id="btnClear">Ryd</button>
    <button class="btn btn-primary" id="btnSave">Gem</button>
  </div>
</div>

<!-- LIST VIEW -->
<div class="view" id="view-list">
  <div class="list-view">
    <div class="list-header">
      <h3>Gemte items (<span id="pendingCount">0</span>)</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-accent" id="btnExport">Eksportér</button>
        <button class="btn btn-sm btn-danger" id="btnClearAll">Slet alle</button>
      </div>
    </div>
    <div class="pending-list" id="pendingList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
